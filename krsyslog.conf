# Global Directives
module(load="imuxsock")   # Local system logging (e.g., via logger command)
module(load="imklog")     # Kernel logging
module(load="omfwd")      # Forwarding module

# Templates (optional but recommended)
template(name="ForwardFormat" type="string" string="<%PRI%>%TIMESTAMP% %HOSTNAME% %syslogtag%%msg%")

# Ruleset: Forward ALL logs to SIEM
*.* action(
    type="omfwd"
    target="192.168.227.137"
    port="514"
    protocol="udp"
    template="ForwardFormat"
    queue.type="LinkedList"
    action.resumeRetryCount="-1"
    )


